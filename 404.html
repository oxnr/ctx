<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="apple-mobile-web-app-title" content="ctx" />
    <title>Redirecting...</title>
    <script>
      (() => {
        const redirects = {
          "/index.html": "/",
          "/thesis.html": "/thesis",
          "/learn.html": "/learn",
          "/stack.html": "/stack",
          "/work.html": "/thesis",
          "/practice/index.html": "/thesis",
          "/thesis/index.html": "/thesis",
          "/learn/index.html": "/learn",
          "/stack/index.html": "/stack"
        };

        const path = window.location.pathname;
        const target = redirects[path];

        if (target) {
          window.location.replace(`${target}${window.location.search}${window.location.hash}`);
        }
      })();
    </script>
  </head>
  <body>
    <p>Page not found.</p>
  </body>
</html>
